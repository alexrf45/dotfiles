[colors.primary]
foreground = "#cccccc"
background = "#101010"

[colors.selection]
text = "#000000"
background = "#cccccc"

[colors.normal]
cyan = "#86e1fc"
magenta = "#c099ff"
yellow = "#ffc777"
white = "#828bb8"
black = "#1b1d2b"
green = "#c3e88d"
blue = "#82aaff"
red = "#ff757f"

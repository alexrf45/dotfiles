# Put the following lines in your ~/.config/alacritty/alacritty.toml

[colors.cursor]
cursor = "#c8d3f5"
text = "#222436"

[colors.bright]
cyan = "#b2ebff"
magenta = "#caabff"
yellow = "#ffd8ab"
white = "#c8d3f5"
black = "#444a73"
green = "#c7fb6d"
blue = "#9ab8ff"

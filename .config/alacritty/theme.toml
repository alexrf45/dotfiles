# Put the following lines in your ~/.config/alacritty/alacritty.toml

[colors.bright]
black = "#2a2a2a"
red = "#ff5d62"
cyan = "#a3d4d5"
blue = "#81c0da"
magenta = "#d27e99"
white = "#dcd7ba"
yellow = "#e6c384"
green = "#aed97a"

[colors.normal]
black = "#181616"
red = "#e14c4c"
cyan = "#9cabca"
blue = "#5690ac"
magenta = "#957fb8"
white = "#dcd7ba"

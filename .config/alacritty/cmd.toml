# "cmd" — classic Windows command prompt: plain white on pure black.
# Mirrors the structure of matrix.toml / kali.toml. Switch in via the
# `import` line in alacritty.toml. Pairs with Neovim colors/cmd.lua.
# The 16 ANSI entries are the canonical Windows console palette.

[colors.primary]
background = "#000000"
foreground = "#C0C0C0"

[colors.cursor]
cursor = "#FFFFFF"
text   = "#000000"

[colors.selection]
background = "#FFFFFF"
text       = "#000000"

[colors.normal]
black   = "#000000"
red     = "#800000"
green   = "#008000"
yellow  = "#808000"
blue    = "#C0C0C0"
magenta = "#800080"
cyan    = "#008080"
white   = "#C0C0C0"

[colors.bright]
black   = "#808080"
red     = "#FF0000"
green   = "#00FF00"
yellow  = "#FFFF00"
blue    = "#0000FF"
magenta = "#FF00FF"
cyan    = "#00FFFF"
white   = "#FFFFFF"

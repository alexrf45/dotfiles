# "The Matrix" — phosphor green + amber accents on a pure-black void.
# Mirrors the structure of kali.toml. Switch in via the `import` line in
# alacritty.toml. Pairs with the Neovim colors/matrix.lua scheme.

[colors.primary]
background = "#000000"
foreground = "#00D92B"

[colors.cursor]
cursor = "#00FF41"
text   = "#000000"

[colors.selection]
background = "#003B00"
text       = "#C8FFD4"

[colors.normal]
black   = "#0D0208"
red     = "#FF4F00"
green   = "#008F11"
yellow  = "#FFB000"
blue    = "#00B86B"
magenta = "#6FFF9F"
cyan    = "#39FF74"
white   = "#00C730"

[colors.bright]
black   = "#005F1E"
red     = "#FF6B33"
green   = "#00FF41"
yellow  = "#FFC957"
blue    = "#2BE08A"
magenta = "#9FFFC4"
cyan    = "#6FFF9F"
white   = "#C8FFD4"
